<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #calendar {
      width: 100vw;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    
    initialView: 'multiMonth',

    views: {
      multiMonth: {
        type: 'multiMonth',
        duration: { months: 3 },
        multiMonthMaxColumns: 3   // 👈 forces horizontal layout
      }
    },

    height: '100%',

    events: {
      url: 'https://outlook.office365.com/owa/calendar/c05d4844233c48bba59d9032c7f20f74@gitxaalanation.com/80b9ce196a384e03b25cd405ff62601f3240945399565290191/calendar.ics',
      format: 'ics'
    }
  });

  calendar.render();
});
</script>

</body>
</html>
