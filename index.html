<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar ICS Proxy Test</title>

  <!-- FullCalendar core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- MultiMonth plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/multimonth@6.1.8/index.global.min.js"></script>

  <!-- iCalendar (ICS) plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: white;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #calendar {
      width: 95%;
      max-width: 1800px;
    }

    .fc {
      font-size: 0.85em;
    }
  </style>
</head>
<body>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  const calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'multiMonth',

      views: {
        multiMonth: {
          type: 'multiMonth',
          duration: { months: 2 },
          multiMonthMaxColumns: 2
        }
      },

      height: 'auto',

      eventSources: [
        {
          url:
            'https://corsproxy.io/?'
            + encodeURIComponent('https://fullcalendar.io/api/demo-feeds/ics'),
          format: 'ics'
        }
      ]
    }
  );

  calendar.render();
});
</script>

</body>
</html>
