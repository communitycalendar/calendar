<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- FullCalendar core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- FullCalendar iCalendar (ICS) plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: white;
    }

    /* Center calendar vertically and horizontally */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #calendar {
      width: 95%;
      max-width: 1800px;
    }

    /* Scale down slightly so all rows fit on TV displays */
    .fc {
      font-size: 0.85em;
    }
  </style>
</head>
<body>

  <div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      const calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
          initialView: 'multiMonth',

          views: {
            multiMonth: {
              type: 'multiMonth',
              duration: { months: 2 },
              multiMonthMaxColumns: 2
            }
          },

          height: 'auto',

          events: {
            // ✅ BULLET‑PROOF CACHE BUSTING
            url: 'https://outlook.office365.com/owa/calendar/c05d4844233c48bba59d9032c7f20f74@gitxaalanation.com/80b9ce196a384e03b25cd405ff62601f3240945399565290191/calendar.ics'
                 + '?cb=' + new Date().getTime(),
            format: 'ics'
          }
        }
      );

      calendar.render();

      // Auto refresh every 10 minutes (good for Yodeck)
      setTimeout(() => location.reload(), 600000);
    });
  </script>

</body>
</html>
</html>
