<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Calendar</title>

  <!-- FullCalendar core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.globalpt>

  <!-- MultiMonth plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/multimonth@6.1.8/index.global.min.js"></script>

  <!-- iCalendar (ICS) plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #calendar {
      width: 95%;
      max-width: 1800px;
    }

    .fc {
      font-size: 0.85em;
    }
  </style>
</head>
<body>

  <div id="calendar"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const calendarEl = document.getElementById("calendar");

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "multiMonth",

        views: {
          multiMonth: {
            type: "multiMonth",
            duration: { months: 2 },
            multiMonthMaxColumns: 2
          }
        },

        height: "auto",

        eventSources: [
          {
            url: "https://community-calendar-proxy-aebgbqdpamayefht.canadacentral-01.azurewebsites.net/api/calendar",
            format: "ics"
          }
        ]
      });

      calendar.render();

      // Auto-refresh every 10 minutes (good for Yodeck)
      setTimeout(function () {
        location.reload();
      }, 600000);
    });
  </script>

</body>
</html>
