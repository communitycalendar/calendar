<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: white;
    }

    /* Force full HD layout regardless of Yodeck container */
    #wrapper {
      width: 1920px;
      height: 1080px;
    }

    #calendar {
      width: 1920px;
    }

    /* Make it readable on a TV */
    .fc {
      font-size: 1.3em;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="calendar"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

    // 3-month layout
    initialView: 'multiMonth',

    views: {
      multiMonth: {
        type: 'multiMonth',
        duration: { months: 3 },
        multiMonthMaxColumns: 3
      }
    },

    // Force proper height
    height: 1080,

    // Prevent Yodeck from forcing layout changes
    handleWindowResize: false,
    windowResizeDelay: 0,

    // Outlook calendar feed
    events: {
      url: 'https://outlook.office365.com/owa/calendar/c05d4844233c48bba59d9032c7f20f74@gitxaalanation.com/80b9ce196a384e03b25cd405ff62601f3240945399565290191/calendar.ics',
      format: 'ics'
    }

  });

  calendar.render();

  // Auto refresh every 10 minutes
  setTimeout(function(){
    location.reload();
  }, 600000);

});
</script>

</body>
</html>
