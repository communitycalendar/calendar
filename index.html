<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- FullCalendar core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- FullCalendar iCalendar (ICS) plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: white;
    }

    /* Center calendar vertically and horizontally */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #calendar {
      width: 95%;
      max-width: 1800px;
    }

    /* Scale down slightly so all rows fit on TV displays */
    .fc {
      font-size: 0.85em;
    }
