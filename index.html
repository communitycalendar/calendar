<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Calendar</title>

  <!-- FullCalendar CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">

  <!-- FullCalendar Core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- MultiMonth plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/multimonth@6.1.8/index.global.min.js"></script>

  <!-- iCalendar parser -->
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>

  <!-- FullCalendar iCalendar plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page-container {
      width: 100%;
      max-width: 1800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo header */
    .header {
      width: 100%;
      text-align: center;
      padding: 10px 0 5px 0;
    }

    .logo {
      max-height: 80px;   /* Adjust if needed */
      width: auto;
    }

    #calendar {
      width: 95%;
    }

    /* Slightly smaller text for TVs */
    .fc {
      font-size: 0.85em;
    }

    /* ✅ Allow event titles to wrap (no truncation) */
    .fc .fc-daygrid-event {
      white-space: normal !important;
      align-items: flex-start;
    }

    .fc .fc-daygrid-event .fc-event-title {
      white-space: normal !important;
      overflow: visible;
      word-break: break-word;
      line-height: 1.2;
    }
  </style>
</head>
<body>

  <div class="page-container">

    <!-- Logo -->
    <div class="header">
      <img src="logo.png" alt="Organization Logo" class="logo">
    </div>

    <!-- Calendar -->
    <div id="calendar"></div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        {
          initialView: "multiMonth",

          views: {
            multiMonth: {
              type: "multiMonth",
              duration: { months: 2 },
              multiMonthMaxColumns: 2
            }
          },

          /* Always show current month + next month */
          initialDate: new Date().toISOString().slice(0, 7) + "-01",

          height: "auto",

          eventSources: [
            {
              url: "https://community-calendar-proxy-aebgbqdpamayefht.canadacentral-01.azurewebsites.net/api/calendar",
              format: "ics"
            }
          ]
        }
      );

      calendar.render();

      /* Auto-refresh every 10 minutes (signage safe) */
      setTimeout(() => location.reload(), 600000);
    });
  </script>

</body>
</html>
