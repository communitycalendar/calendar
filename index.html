<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Calendar</title>

  <!-- FullCalendar CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css"
  />

  <!-- FullCalendar Core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- MultiMonth plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/multimonth@6.1.8/index.global.min.js"></script>

  <!-- iCalendar parser (REQUIRED) -->
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>

  <!-- FullCalendar iCalendar plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #calendar {
      width: 95%;
      max-width: 1800px;
    }

    /* Slightly smaller text for TV displays */
    .fc {
      font-size: 0.85em;
    }

    /* ✅ FIX: allow event titles to wrap instead of truncating */
    .fc .fc-daygrid-event {
      white-space: normal !important;
      align-items: flex-start;
    }

    .fc .fc-daygrid-event .fc-event-title {
      white-space: normal !important;
      overflow: visible;
      word-break: break-word;
      line-height: 1.2;
    }
  </style>
</head>
<body>

  <div id="calendar"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const calendar = new FullCalendar.Calendar(
        document.getElementById("calendar"),
        {
          /* Two-month view */
          initialView: "multiMonth",

          views: {
            multiMonth: {
              type: "multiMonth",
              duration: { months: 2 },
              multiMonthMaxColumns: 2
            }
          },

          /* Always show current month + next */
          initialDate: new Date().toISOString().slice(0, 7) + "-01",

          height: "auto",

          eventSources: [
            {
              url: "https://community-calendar-proxy-aebgbqdpamayefht.canadacentral-01.azurewebsites.net/api/calendar",
              format: "ics"
            }
          ]
        }
      );

      calendar.render();

      /* Auto-refresh every 10 minutes (signage safe) */
      setTimeout(function () {
        location.reload();
      }, 600000);
    });
  </script>

</body>
</html>
