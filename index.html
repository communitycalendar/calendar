<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: white;
    }

    #calendar {
      width: 100vw;
      height: 100vh;
    }

    /* Scale everything slightly so all 3 months fit */
    .fc {
      transform: scale(0.9);
      transform-origin: top left;
      width: 111%; /* compensates for scaling */
    }
  </style>
</head>
<body>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

    initialView: 'multiMonth',

    views: {
      multiMonth: {
        type: 'multiMonth',
        duration: { months: 3 },
        multiMonthMaxColumns: 3
      }
    },

    height: '100%',

    events: {
      url: 'https://outlook.office365.com/owa/calendar/c05d4844233c48bba59d9032c7f20f74@gitxaalanation.com/80b9ce196a384e03b25cd405ff62601f3240945399565290191/calendar.ics',
      format: 'ics'
    }

  });

  calendar.render();

  // auto refresh
  setTimeout(function(){
    location.reload();
  }, 600000);

});
</script>

</body>
</html>
